<!DOCTYPE html>
<html>
<head>
<style>
html { background: #10291F; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #10291F; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.content { text-align: center; padding: 40pt; }
.cta-tag { font-size: 9pt; color: #7ed29a; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 12pt; }
.cta-title { font-size: 36pt; font-weight: bold; color: #ddd6c7; margin: 0 0 8pt 0; }
.cta-subtitle { font-size: 14pt; color: #8a9590; margin: 0 0 24pt 0; }
.links-grid { display: flex; gap: 16pt; justify-content: center; margin-bottom: 24pt; }
.link-card {
  background: #151d19;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8pt;
  padding: 14pt 20pt;
  min-width: 140pt;
}
.link-label { font-size: 8pt; color: #8a9590; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4pt; }
.link-value { font-size: 10pt; color: #F0EE9B; font-weight: bold; }
.divider { width: 60pt; height: 1px; background: rgba(255,255,255,0.1); margin: 20pt auto; }
.footer { text-align: center; }
.footer-text { font-size: 9pt; color: #8a9590; margin-bottom: 4pt; }
.footer-name { font-size: 10pt; color: #ddd6c7; font-weight: bold; }
.footer-email { font-size: 9pt; color: #7ed29a; }
.studio { font-size: 8pt; color: #8a9590; margin-top: 16pt; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="content">
  <p class="cta-tag">Get Started</p>
  <h1 class="cta-title">Try Dash Persona</h1>
  <p class="cta-subtitle">Creator Intelligence Engine — Open Source</p>
  <div class="links-grid">
    <div class="link-card">
      <p class="link-label">Live Demo</p>
      <p class="link-value">dash-persona.vercel.app</p>
    </div>
    <div class="link-card">
      <p class="link-label">GitHub</p>
      <p class="link-value">github.com/Fearvox/dash-persona</p>
    </div>
  </div>
  <div class="divider"></div>
  <div class="footer">
    <p class="footer-name">Nolan Zhu</p>
    <p class="footer-email">hello@zonicdesign.art</p>
    <p class="studio">A Zonic Design Studio Project</p>
  </div>
</div>
</body>
</html>
